<!DOCTYPE html>
<html>
<head>
    <title>Todo Form</title>
</head>
<body>

<h1>To-Do Form</h1>

<form method="POST" action="/submittodoitem">
    <label>Item Name:</label><br>
    <input type="text" name="itemName"><br><br>

    <label>Item Description:</label><br>
    <input type="text" name="itemDescription"><br><br>
    <input type="text" name="itemID" placeholder="Item ID"><br><br>
    <input type="text" name="itemUUID" placeholder="Item UUID"><br><br>
    <input type="text" name="itemHash" placeholder="Item Hash"><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
